apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: install-mcp-gateway
spec:
  params:
    - description: Path to workspace kubeconfig
      name: kubeconfig-path
      type: string
    - description: MCP Controller catalog image
      name: catalog-image
      type: string
    - description: Istio provider (ossm3, ocp)
      name: istio-provider
      type: string
    - description: MCP Gateway operator channel
      name: channel
      type: string
    - description: MCP Gateway git revision used to determine chart version
      name: mcp-gateway-revision
      type: string
    - description: If set to 'true' the 'catalog-image' param is ignored and official Catalog is used instead
      name: install-productized-version
      type: string
    - description: If set to 'true' Service Mesh will be installed
      name: install-service-mesh
      type: string
  steps:
    - name: install-mcp-gateway
      image: quay.io/kuadrant/testsuite-pipelines-tools:latest
      env:
      - name: KUBECONFIG
        value: $(params.kubeconfig-path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        # RHCL is installed automatically if installing MCP Gateway via OLM
        export INSTALL_RHCL=false

        if [ "$(params.install-service-mesh)" = "true" ]; then
          export INSTALL_SERVICE_MESH=true
        else
          export INSTALL_SERVICE_MESH=false
        fi

        if [ "$(params.install-productized-version)" = "true" ]; then
          export INSTALL_PRODUCTIZED_VERSION=true
        else
          export INSTALL_PRODUCTIZED_VERSION=false
        fi

        if [ "$(params.mcp-gateway-revision)" = "main" ]; then
          export MCP_GATEWAY_VERSION=local
        else
          mcp_gateway_revision="$(params.mcp-gateway-revision)"
          # remove leading 'v', chart versions are not using it
          export MCP_GATEWAY_VERSION="${mcp_gateway_revision#v}"
        fi

        if [ "$(params.istio-provider)" = "ocp" ]; then
          export USE_OCP_INGRESS=true
        else
          export USE_OCP_INGRESS=false
        fi

        export CATALOG_IMG=$(params.catalog-image)
        export CHANNEL=$(params.channel)

        cd "$(workspaces.shared-workspace.path)/mcp-gateway"

        bash config/openshift/deploy_openshift.sh
  workspaces:
    - name: shared-workspace
