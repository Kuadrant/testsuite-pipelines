apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: install-mcp-gateway
spec:
  params:
    - description: Path to workspace kubeconfig
      name: kubeconfig-path
      type: string
    - description: MCP Controller catalog image
      name: catalog-image
      type: string
    - description: Istio provider (ossm3, ocp)
      name: istio-provider
      type: string
  steps:
    - name: install-mcp-gateway
      image: quay.io/trepel/testsuite-pipelines-tools:0.0.2
      env:
      - name: KUBECONFIG
        value: $(params.kubeconfig-path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        # Kuadrant was installed in helm-deploy Task
        export INSTALL_RHCL=false
        # Service Mesh was installed as part of Kuadrant installation in helm-deploy Task
        export INSTALL_SERVICE_MESH=false
        # Using local, so that chart version that is about to be used depends on what tag/branch of mcp-gateway repository was cloned
        export MCP_GATEWAY_VERSION=local

        export CATALOG_IMG=$(params.catalog-image)
        if [ "$(params.istio-provider)" = "ocp" ]; then
          export USE_OCP_INGRESS=true
        else
          export USE_OCP_INGRESS=false
        fi

        cd "$(workspaces.shared-workspace.path)/mcp-gateway"
        bash config/openshift/deploy_openshift.sh
  workspaces:
    - name: shared-workspace
